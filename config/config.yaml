# ============================================================
# Football Highlight Studio — main configuration
# All tuning lives here. The code reads this file at runtime.
# ============================================================

ingest:
  # working resolution for analysis (downscaled = faster detection).
  # final render always uses the original source quality.
  analysis_height: 540
  audio_sample_rate: 16000
  # hardware acceleration for decoding the (large) source.
  # auto  = let ffmpeg use NVDEC/VAAPI if available, else software (safe default)
  # none  = force software decode
  hwaccel: auto
  # encoder for the analysis proxy. h264_nvenc uses the GPU (L40S etc.) and
  # auto-falls back to libx264 if NVENC is unavailable.
  proxy_encoder: h264_nvenc

detect:
  # ---- audio energy (crowd roar + commentator excitement) ----
  audio:
    enabled: true
    frame_seconds: 1.0          # analysis window
    hop_seconds: 0.5
    # a moment is flagged when smoothed loudness exceeds
    # (rolling_median + zscore_threshold * rolling_std)
    zscore_threshold: 2.2
    smoothing_seconds: 3.0
    min_gap_seconds: 25.0       # merge spikes closer than this

  # ---- scene / replay detection ----
  scene:
    enabled: true
    detector: content           # content | adaptive
    threshold: 27.0
    # process every Nth frame on the proxy (1 = every frame). 2-3 cuts scene
    # detection time 2-3x on a full match with negligible impact on replay
    # clustering accuracy.
    frame_skip: 2
    # replays are usually short, tightly-cut segments after a goal
    replay_max_seconds: 12.0

  # ---- scoreboard OCR (most precise goal detector) ----
  scoreboard_ocr:
    enabled: true
    sample_every_seconds: 5.0   # OCR is expensive; sample sparsely
    # region of interest as fractions of frame [x1, y1, x2, y2].
    # null = auto-detect a stable on-screen graphic region.
    roi: null
    languages: ["en"]

  # ---- commentary keywords (WhisperX / faster-whisper) ----
  commentary:
    enabled: true
    model_size: small           # tiny|base|small|medium|large-v3
    # excitement keywords boost a moment's score (multilingual ok)
    keywords:
      goal: ["goal", "scores", "what a", "gol", "golazo", "gooal", "unbelievable", "screamer"]
      chance: ["chance", "close", "saved", "off the bar", "post", "denied"]
      card: ["red card", "sent off", "penalty", "var", "free kick"]

  # ---- action spotting (optional, highest-precision event model) ----
  # Off by default; needs a SoccerNet-family model. See
  # docs/ROADMAP_FOOTBALL_CV.md and src/detect/action_spotting.py.
  action_spotting:
    enabled: false
    backend: oslactionspotting   # oslactionspotting | custom
    entrypoint: null             # for backend=custom: "module:function"
    min_conf: 0.5
    labels_map: {}               # extra {model_label: our_kind} overrides

  # ---- scout: how event windows are built + score-verified (v2 pipeline) ----
  scout:
    goal_pre_seconds: 20.0        # blueprint: -20s before a goal anchor
    goal_post_seconds: 10.0       # blueprint: +10s after
    pre_seconds: 7.0
    post_seconds: 5.0
    verify_radius_seconds: 25.0   # OCR score-change must land within this of an anchor
    verified_goal_boost: 0.25     # confidence bump when a goal is score-verified
    merge_gap_seconds: 15.0       # collapse anchors closer than this

  # ---- event feed: drive clipping from a detailed textual match report ----
  # The most reliable + cheapest moment source (ClipMaker-style). Supply a
  # play-by-play (CSV/JSON/text) and the per-period kick-off offsets that map the
  # match clock to this video file, and the Scout places precise event windows.
  # COMPLIANCE: prefer public-domain (openfootball) / licensed feeds; scraping
  # some sites breaches their ToS — sourcing rights are the operator's job.
  event_feed:
    enabled: false                # set true + give a source to use the feed
    source: null                  # path to .csv/.json/.txt (or wired from the WebUI)
    # video-time (seconds) of each period's kick-off in THIS file. Mark these
    # once per match (e.g. 2nd half kicks off at 45:40 -> 2740).
    kickoffs: {}                  # e.g. {1: 0, 2: 2740}
    min_importance: 0.0           # drop feed events below this xT/importance
    align_to_ocr: true            # snap goal windows to the scoreboard OCR clock
    ocr_align_radius_seconds: 40.0
    top_n: 0                      # keep only the N strongest moments (0 = all)
    # ESPN public (keyless) source — goals/cards+minutes for current seasons.
    # Compliance-clean (open API, not a scrape). slug: esp.1=La Liga,
    # fifa.world=World Cup. fixture_id = ESPN event id for the match.
    espn:
      enabled: false
      slug: esp.1
      fixture_id: null

fusion:
  # final score = weighted sum of normalized signal strengths
  weights:
    action_spotting: 1.2        # a learned event model dominates when present
    scoreboard_ocr: 1.0         # score change is near-certain
    audio: 0.6
    commentary: 0.5
    scene_replay: 0.4
  min_confidence: 0.45          # drop weak candidates
  max_moments: 25               # cap clips per match
  # classify moment type from which signals fired
  types: ["goal", "chance", "save", "skill", "card"]

clip:
  pre_seconds: 7.0              # buildup before the moment
  post_seconds: 5.0             # celebration / aftermath
  # goals get extra buildup
  goal_pre_seconds: 11.0
  goal_post_seconds: 7.0

models:
  # Auto-download football models from public Hugging Face repos on first use
  # (player/goalkeeper/referee/ball, dedicated ball, and pitch keypoints).
  # Honors HF_TOKEN from the environment if set. See src/modelhub.py.
  auto_download: true

vision:
  enabled: true
  device: cuda                  # cuda | cpu
  player_model: models/football-player.pt    # auto-downloaded (player/gk/ref/ball)
  ball_model: models/football-ball.pt         # auto-downloaded dedicated ball model
  conf_threshold: 0.3
  iou_threshold: 0.5
  imgsz: 1280
  tracker: bytetrack            # via supervision
  # Fallback class indices ONLY — at runtime classes are resolved BY NAME from
  # the model itself, so any football model works regardless of index order.
  classes:
    player: [0]
    ball: [32]                  # generic COCO 'sports ball' = 32
  # small fast ball: sliced/tiled inference so it isn't lost at low res (SAHI)
  ball:
    slice_inference: false      # enable for a dedicated ball pass
    slice: 640
    overlap: 0.2

  # ---- camera calibration: pitch keypoints -> homography (metric stats) ----
  # See docs/ROADMAP_FOOTBALL_CV.md (L2). Needs a pitch-keypoint model.
  pitch:
    enabled: false              # opt-in (download is automatic); see ROADMAP_FOOTBALL_CV.md
    model: models/football-pitch.pt
    conf: 0.5
    min_points: 4
    sample_every_frames: 1
    smoothing: 0.8
    validate: true              # reject implausible homographies ("lines into sky")
    validate_margin_m: 40.0     # image corners must map within pitch + this margin (m)
    validate_max_cond: 10000000 # max condition number of H before it's rejected

  # ---- team classification -> possession-aware protagonist (L3) ----
  teams:
    enabled: true               # HSV jersey clustering (no extra model needed)
    method: hsv                 # hsv | siglip
    n_teams: 2

  # ---- jersey number recognition (EasyOCR) -> hero match by number ----
  # Lets the Director's "follow #18" bind to the right track id instead of just
  # the nearest player to the ball. Best on close/replay frames; degrades to the
  # geometric pick when numbers can't be read on wide shots.
  jerseys:
    enabled: true
    sample_every_frames: 3      # OCR every Nth frame (cost control)
    min_box_height_px: 60       # skip tiny far-away players
    min_confidence: 0.35        # aggregate confidence to trust a number
    min_reads: 2                # need at least this many sightings

telestration:
  enabled: true
  spotlight_scorer: true        # moving glow under the key player
  motion_arrows: true           # arrow along a tracked player's path
  ball_trail: true              # fading trail behind the ball
  highlight_zone: true          # shade free space / danger zone
  freeze_callout: true          # freeze + zoom + arrow before key action
  arrow_color: [0, 200, 255]    # BGR
  spotlight_color: [0, 220, 255]
  trail_color: [255, 255, 255]  # ball trail = white neon
  line_thickness: 2             # SLEEK halos: thin outline (<=2px), not heavy
  team_halos: true              # colour every player's halo in their club colour
                                # (from vision.teams); hero gets a slightly thicker ring
  halo_grounded: true           # draw only the lower arc so rings sit UNDER the
                                # boots on the grass (seg-mask-free occlusion)
  # Vivid NEON team palette (BGR), assigned by team label so rings read clearly
  # on broadcast (instead of the muddy median-jersey colour). team0 / team1 / ...
  team_palette:
    - [60, 60, 255]             # team 0 -> neon red
    - [40, 230, 255]            # team 1 -> neon yellow
  trail_length: 12              # ball trail length in frames (10-15 = quick neon spark)
  trail_max_jump_frac: 0.18     # drop trail segments longer than this*frame_w (ball can't teleport)
  halo_hold_frames: 6           # keep the hero halo for N frames if detection drops
  halo_smooth: 0.5              # EMA factor for the hero halo box (anti-flicker)
  possession_plate: true        # compact semi-transparent POSSESSION plate (bottom)

# ---- shot segmentation (broadcast camera cuts) ----
# The studio plans tracking + crop PER SHOT so the 9:16 camera resets at every
# cut instead of gliding across it, and flags literal-duplicate replay inserts.
shots:
  enabled: true
  threshold: 27.0               # PySceneDetect ContentDetector sensitivity
  min_seconds: 0.6              # merge shorter shots into their neighbour
  detect_replays: true          # flag near-identical repeated shots (conservative)
  replay_correlation: 0.97      # HSV-hist correlation to call a shot a duplicate

edit:
  reframe:
    target_aspect: "9:16"       # 9:16 | 1:1 | 16:9
    mode: action_track          # action_track | center | letterbox
    smoothing: 0.85             # camera smoothing for the virtual crop
    # Aggressive action-centric punch-in: size the crop so the hero fills this
    # fraction of the frame height (0.45 = hero ~45% tall). Lower = wider.
    target_subject_height: 0.45
    min_zoom: 1.0               # never wider than full-height slice
    max_zoom: 2.6               # cap punch-in so a tiny far player doesn't over-zoom
  effects:
    slowmo_on_key: true
    slowmo_factor: 0.4
    slowmo_window: 2.5
    slowmo_interpolate: true          # motion-interpolate the slowed window so
                                      # it glides instead of stepping/juddering
    slowmo_interpolation_quality: mci # mci (motion-compensated) | blend (cheap)
    freeze_zoom: true
    freeze_zoom_scale: 1.4
  audio:
    music_dir: assets/music
    crowd_sfx: assets/sfx/crowd_roar.wav
    music_db: -16.0             # music loudness target (LUFS-ish)
    music_volume: 0.35          # linear gain applied to the music bed
    duck_under_commentary: true # sidechain-duck music when the commentator speaks
    loudnorm: true              # EBU R128 normalize the final mix
    loudness_target_lufs: -14   # social-platform target (TikTok/Reels/Shorts)
    beat_sync: false            # snap slow-mo onset / cut-in to the music beat
    beat_snap_max_shift: 0.12   # max seconds a timestamp may be nudged onto a beat
  captions:
    enabled: true
    style: tiktok               # tiktok | clean | broadcast
    font: assets/fonts/Inter-Bold.ttf
    fontsize: 58
    safe_y: 0.62                # vertical position as a fraction of height;
                                # kept above the bottom ~20% platform-UI band
    max_words_per_line: 4

render:
  encoder: h264_nvenc           # h264_nvenc | libx264
  crf: 20                       # used for libx264; nvenc uses -cq
  fps: 30
  # per_clip  = one finished clip per detected moment (~15-23s each)
  # compilation = one reel that stitches several moments to a target length
  output_mode: per_clip         # per_clip | compilation
  compilation:
    target_seconds: 45          # aim for this length
    min_seconds: 30
    max_seconds: 60
    per_moment_max_seconds: 12  # cap each moment's contribution
  profiles:
    tiktok:   { width: 1080, height: 1920, fps: 30 }
    reels:    { width: 1080, height: 1920, fps: 30 }
    shorts:   { width: 1080, height: 1920, fps: 30 }
    youtube:  { width: 1920, height: 1080, fps: 30 }


# ============================================================
# v2 studio pipeline (src/studio_pipeline.py) — Scout/Director/
# Cameraman/Composer. The legacy pipeline ignores these blocks.
# ============================================================

# ---- Director: vision-LLM editing manifest ----
# On Modal the served brain is Qwen2.5-VL-72B-Instruct-AWQ (vLLM, A100-80GB);
# wire it by setting backend=openai + base_url (or the FHS_VLM_URL env, which the
# Modal web()/studio functions translate automatically). Default stays heuristic
# so the pipeline runs offline with no GPU/network.
director:
  backend: heuristic            # heuristic | gemini | openai (Qwen2.5-VL/local vLLM)
  model: gemini-1.5-flash       # gemini id, or openai/local model name (e.g. qwen2.5-vl)
  base_url: null                # OpenAI-compatible endpoint (e.g. the vLLM /v1 URL)
  sample_fps: 1.0               # frames/sec fed to the model
  max_frames: 16
  temperature: 0.4
  max_retries: 2                # vision-LLM JSON call retries before fallback
  timeout: 60                   # seconds per vision-LLM call
  use_asr: false                # transcribe commentary (faster-whisper) for context
  asr_model: base               # faster-whisper model id when use_asr=true
  allow_curation: true          # let the Director drop clips it judges non-highlights
  # offline cutaway/bench safety net (drops a clip with almost no ball AND very
  # few players on screen; never drops a score-verified goal). Works without VLM.
  drop_cutaways: true
  cutaway_min_ball_frac: 0.05
  cutaway_min_players: 3.0
  # offline hook fallbacks if no LLM and no brand hooks
  hooks: {}

# ---- Cameraman: BoT-SORT + camera motion compensation + smoothing ----
tracking:
  backend: ultralytics          # ultralytics (built-in BoT-SORT+GMC) | roboflow
  gmc_method: sparseOptFlow      # sparseOptFlow | orb | sift | ecc | none
  track_high_thresh: 0.25
  track_low_thresh: 0.1
  new_track_thresh: 0.25
  track_buffer: 60
  match_thresh: 0.8
  with_reid: false
  # viewport smoothing (constant-velocity Kalman; EMA fallback)
  kalman_process_noise: 2.0      # higher = camera reacts faster
  kalman_measurement_noise: 120.0  # higher = camera is lazier/smoother
  smoothing: 0.85                # EMA alpha (used only if Kalman fails)

# ---- Graphics: pitch homography for grass-anchored overlays ----
graphics:
  enabled: false                 # opt-in; needs the pitch model (auto-downloaded)
  homography_solver: cv2         # cv2 (RANSAC) | kornia | kornia_lines

# ---- Possession: ball-to-nearest-player proximity tracking ----
possession:
  radius_m: 1.5                  # blueprint: ~1 m; 1.5 m is practical for broadcast
  min_frames: 3                  # blueprint: hold > 3 frames to confirm
  bridge_frames: 3               # tolerate brief detection dropouts within a run


# ---- QA + review loop (v3): watch the rendered output, fix, re-render ----
# The studio renders the Director's EditPlan, runs deterministic QA on the
# output (black bars / dead frames / loudness / duration), optionally asks the
# vision Critic "does it look good", and revises the plan up to max_revisions.
qa:
  enabled: true
  max_revisions: 1               # bounded re-renders when QA/critic flag issues
  pass_score: 0.75               # average check score needed to pass
  use_critic: true               # also ask the vision-LLM critic (if configured)
  critic_pass_score: 0.7
  critic_frames: 8               # output keyframes shown to the critic
  loudness_tolerance: 3.0        # LUFS tolerance around the target
  zoom_relax: 0.8                # factor to relax per-shot zoom on crop-jump
  # min_seconds / max_seconds: optional duration window (unset => no duration gate)


# ---- audio-event perception (v3): crowd-roar / spike cue for Scout+Director ----
audio_events:
  enabled: true
  sample_rate: 16000
  hop_seconds: 0.5
  roar_z: 3.0                   # robust z-score for a sustained crowd roar
  spike_z: 5.0                  # short loud transient (whistle/impact)
  roar_min_seconds: 1.0

# ---- cross-shot hero Re-ID (v3): follow the same player through cuts ----
reid:
  enabled: true
  backend: histogram            # histogram | osnet (osnet needs torchreid)
  min_sim: 0.5                  # min appearance similarity to link a track
